name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel redundant runs when new commits land on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: zig build + zig build test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig version
        run: zig version

      - name: zig fmt --check
        run: zig fmt --check src build.zig

      - name: zig build
        run: zig build

      # The 9-example byte-diff acceptance gate runs inside `zig build test`
      # via src/testdata/<example>.{o,shim.so} goldens and the integration
      # loop in src/integration_test.zig. No separate harness needed.
      # V3 sweep runs through the same path (v3.shim.so goldens).
      - name: zig build test --summary all
        run: zig build test --summary all

      - name: smoke-test CLI V0 (hello.o)
        run: |
          ./zig-out/bin/elf2sbpf src/testdata/hello.o /tmp/hello.zig.so
          cmp /tmp/hello.zig.so src/testdata/hello.shim.so

      - name: smoke-test CLI V3 (hello.o --v3)
        run: |
          ./zig-out/bin/elf2sbpf --v3 src/testdata/hello.o /tmp/hello.v3.zig.so
          cmp /tmp/hello.v3.zig.so src/testdata/hello.v3.shim.so
